<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" width="700" height="160">
  <!-- BVN 24×7 Masthead — "State Broadcast" variant -->
  <!-- Primary: dark background version -->
  <defs>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C41E3A"/>
      <stop offset="100%" stop-color="#8B1A2B"/>
    </linearGradient>
    <linearGradient id="top-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C41E3A"/>
      <stop offset="60%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="bottom-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#1B4F8A" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="div-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#334455"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="160" fill="#080B14" rx="4"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="699" height="159" fill="none" stroke="#141828" rx="4"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="160" fill="url(#accent-grad)" rx="2"/>

  <!-- Top rule -->
  <rect x="0" y="0" width="700" height="2" fill="url(#top-rule)"/>

  <!-- BVN text -->
  <text x="40" y="92" font-family="Bebas Neue, sans-serif" font-size="72" letter-spacing="18" fill="#FFFFFF">BVN</text>

  <!-- Red underbar -->
  <rect x="40" y="100" width="145" height="3" fill="#C41E3A" rx="1"/>

  <!-- Vertical divider -->
  <rect x="210" y="30" width="1" height="80" fill="url(#div-grad)"/>

  <!-- 24×7 -->
  <text x="232" y="72" font-family="Bebas Neue, sans-serif" font-size="34" letter-spacing="4" fill="#C41E3A">24×7</text>

  <!-- Always Watching badge -->
  <rect x="310" y="52" width="116" height="22" fill="none" stroke="#1B4F8A" stroke-opacity="0.27" rx="1"/>
  <text x="318" y="67" font-family="monospace" font-size="9" letter-spacing="3" fill="#8BAAC8">ALWAYS WATCHING</text>

  <!-- Bharatvarsh News Network -->
  <text x="232" y="95" font-family="Inter, sans-serif" font-size="9" letter-spacing="5" fill="#3a4a6a">BHARATVARSH NEWS NETWORK</text>

  <!-- LIVE badge -->
  <rect x="580" y="42" width="90" height="36" fill="#C41E3A" fill-opacity="0.07" stroke="#C41E3A" stroke-opacity="0.2" rx="2"/>
  <circle cx="600" cy="60" r="3" fill="#C41E3A"/>
  <text x="612" y="65" font-family="monospace" font-size="10" letter-spacing="3" fill="#C41E3A">LIVE</text>

  <!-- Bottom ticker strip background -->
  <rect x="0" y="120" width="700" height="40" fill="#0D1220"/>
  <rect x="0" y="120" width="700" height="1" fill="#1B4F8A" fill-opacity="0.09"/>

  <!-- Ticker dot -->
  <circle cx="48" cy="140" r="2.5" fill="#1B4F8A"/>

  <!-- Ticker text -->
  <text x="60" y="143" font-family="monospace" font-size="8" letter-spacing="2" fill="#2a3a5a">STATE BROADCAST · DIRECTIVE FEED · CLEARANCE: PUBLIC</text>

  <!-- Bottom rule -->
  <rect x="0" y="158" width="700" height="2" fill="url(#bottom-rule)"/>
</svg>