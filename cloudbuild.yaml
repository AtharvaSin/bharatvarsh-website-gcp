# Cloud Build CI/CD for Bharatvarsh
# Trigger: push to main or staging branch
# Phase 7: Canary deployment with traffic splitting

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/DIRECT_DATABASE_URL/versions/latest
      env: 'DIRECT_DATABASE_URL'

steps:
  # Step 1: Install dependencies and run checks
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        # Create .env for build-time variables (Next.js inlining)
        echo "NEXT_PUBLIC_BASE_URL=https://welcometobharatvarsh.com" >> .env
        echo "NEXT_PUBLIC_FORUM_ENABLED=true" >> .env
        echo "NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=true" >> .env
        echo "NEXT_PUBLIC_RATE_LIMIT_ENABLED=true" >> .env
        echo "NEXT_PUBLIC_LIVEKIT_URL=${_LIVEKIT_URL}" >> .env

        npm ci
        npx prisma generate
        npm run build

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/bharatvarsh:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/bharatvarsh:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=true'
      - '--build-arg'
      - 'NEXT_PUBLIC_LIVEKIT_URL=${_LIVEKIT_URL}'
      - '.'

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/bharatvarsh'

  # Apply pending Prisma migrations to Cloud SQL before traffic flips.
  # Uses DIRECT_DATABASE_URL (bypasses pooler — required for migrations).
  # Cloud Build containers don't auto-mount Cloud SQL like Cloud Run does, so we
  # run cloud-sql-proxy in-step on a Unix socket that matches the production
  # /cloudsql/<INSTANCE> path that DATABASE_URL secret already references.
  # Requires Cloud Build SA to have roles/cloudsql.client.
  - id: 'db-migrate'
    name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        # NOTE: bash variables in Cloud Build heredocs need double-dollar
        # escapes so the YAML substitution layer doesn't grab them.
        # Install cloud-sql-proxy (small static binary)
        curl -sSL -o /usr/local/bin/cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
        chmod +x /usr/local/bin/cloud-sql-proxy
        # Start proxy in background, listening on Unix socket dir matching prod
        mkdir -p /cloudsql
        cloud-sql-proxy --unix-socket /cloudsql \
          bharatvarsh-website:us-central1:bharatvarsh-db \
          > /tmp/csp.log 2>&1 &
        PROXY_PID=$$!
        # Wait up to 30s for the socket to appear
        SOCK="/cloudsql/bharatvarsh-website:us-central1:bharatvarsh-db/.s.PGSQL.5432"
        for i in $$(seq 1 30); do
          if [ -S "$$SOCK" ]; then
            echo "Cloud SQL Proxy ready (waited $${i}s)"
            break
          fi
          sleep 1
        done
        if [ ! -S "$$SOCK" ]; then
          echo "ERROR: Cloud SQL Proxy did not become ready in 30s. Proxy log:"
          cat /tmp/csp.log
          exit 1
        fi
        # Apply pending migrations
        npm ci --omit=dev
        npx prisma generate
        npx prisma migrate deploy
        # Cleanup
        kill $$PROXY_PID 2>/dev/null || true
        wait $$PROXY_PID 2>/dev/null || true
    secretEnv: ['DATABASE_URL', 'DIRECT_DATABASE_URL']

  # Step 4: Deploy canary revision (no traffic)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-canary'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/bharatvarsh:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--port'
      - '8080'
      - '--no-traffic'
      - '--tag'
      - 'canary'
      - '--set-secrets=RESEND_API_KEY=RESEND_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,AUTH_SECRET=AUTH_SECRET:latest,NEXTAUTH_SECRET=AUTH_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,DIRECT_DATABASE_URL=DIRECT_DATABASE_URL:latest,LIVEKIT_API_KEY=LIVEKIT_API_KEY:latest,LIVEKIT_API_SECRET=LIVEKIT_API_SECRET:latest,CRON_SECRET=CRON_SECRET:latest'
      - '--set-env-vars=AUTH_TRUST_HOST=true,AUTH_URL=https://welcometobharatvarsh.com,NEXTAUTH_URL=https://welcometobharatvarsh.com,VERTEX_AI_PROJECT=${PROJECT_ID},VERTEX_AI_LOCATION=${_REGION},NEXT_PUBLIC_AI_MODERATION_ENABLED=true'

  # Step 5: Route 10% traffic to canary
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'canary-10'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        # Get the latest revision name
        CANARY_REV=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.latestCreatedRevisionName)')

        # Get the current serving revision
        STABLE_REV=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.traffic[0].revisionName)')

        echo "Canary: $$CANARY_REV, Stable: $$STABLE_REV"

        # Split traffic: 10% canary, 90% stable
        gcloud run services update-traffic ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --to-revisions="$$CANARY_REV=10,$$STABLE_REV=90"

        echo "10% traffic routed to canary. Waiting ${_CANARY_SOAK_SECONDS}s..."
        sleep ${_CANARY_SOAK_SECONDS}

  # Step 6: Check canary health (error rate check)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'canary-health-check'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        # Verify canary is healthy by hitting the health endpoint
        CANARY_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.url)')

        # Retry loop for health check (max 5 attempts with 5s delay)
        MAX_RETRIES=5
        RETRY_COUNT=0

        while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
          HTTP_STATUS=$$(curl -s -o /dev/null -w "%{http_code}" "$$CANARY_URL/api/health")

          if [ "$$HTTP_STATUS" = "200" ]; then
            echo "Canary health check passed (HTTP 200)."
            exit 0
          fi

          echo "Health check failed (HTTP $$HTTP_STATUS). Retrying ($$((RETRY_COUNT+1))/$$MAX_RETRIES)..."
          RETRY_COUNT=$$((RETRY_COUNT+1))
          sleep 5
        done

        echo "ERROR: Canary health check failed after $$MAX_RETRIES attempts. Rolling back..."
        # Rollback: send all traffic to stable revision
        STABLE_REV=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.traffic[0].revisionName)')
        gcloud run services update-traffic ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --to-revisions="$$STABLE_REV=100"
        exit 1

  # Step 7: Ramp to 50% traffic
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'canary-50'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        CANARY_REV=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.latestCreatedRevisionName)')

        STABLE_REV=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.traffic[0].revisionName)')

        gcloud run services update-traffic ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --to-revisions="$$CANARY_REV=50,$$STABLE_REV=50"

        echo "50% traffic routed to canary. Waiting ${_CANARY_SOAK_SECONDS}s..."
        sleep ${_CANARY_SOAK_SECONDS}

  # Step 8: Promote canary to 100% traffic
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'promote-canary'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        CANARY_REV=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --format='value(status.latestCreatedRevisionName)')

        gcloud run services update-traffic ${_SERVICE_NAME} \
          --region=${_REGION} --platform=managed \
          --to-revisions="$$CANARY_REV=100"

        echo "Canary promoted to 100% traffic. Deployment complete."

substitutions:
  _REGION: us-central1
  _REPO_NAME: bharatvarsh
  _SERVICE_NAME: bharatvarsh-website
  _CLOUD_SQL_INSTANCE: 'bharatvarsh-website:us-central1:bharatvarsh-db'
  _CANARY_SOAK_SECONDS: '120'
  _LIVEKIT_URL: 'wss://bharatvarsh-website-ljazyvnb.livekit.cloud'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/bharatvarsh:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/bharatvarsh:latest'
